// ═══════════════════════════════════════════
//  QUESTION BANK  — Add as many as you like!
//  Topics: algebra | geometry | arithmetic | statistics | trigonometry | numbers
//  Difficulty: 1 = Easy, 2 = Medium, 3 = Hard
// ═══════════════════════════════════════════
const QUESTIONS = [
  {

  },
  {

  {
    topic: "Statistics",

    question: "The ages of five students are: 12, 14, 11, 15, 13. What is the mean age?",
    options: ["12", "13", "14", "15"],

    explanation: "Sum = 12+14+11+15+13 = 65. Mean = 65 ÷ 5 = <strong>13</strong>."
  },
  {
    topic: "Trigonometry",
    difficulty: 2,
    question: "In a right-angled triangle, if sin θ = 3/5, what is cos θ?",
    options: ["3/4", "4/5", "5/4", "4/3"],

  {

  },
  {
    topic: "Geometry",
    difficulty: 2,
    question: "A rectangular field is 40 m long and 25 m wide. What is its perimeter?",
    options: ["100 m", "120 m", "130 m", "65 m"],

  },
  {
    topic: "Statistics",
    difficulty: 2,
    question: "The scores 8, 5, 9, 3, 5, 7, 5, 6 are arranged. What is the mode?",

  {

    answer: 2,
    explanation: "Arc length = (θ/360) × 2πr = (72/360) × 2 × 3.142 × 10 = 0.2 × 62.84 ≈ <strong>12.57 cm</strong>."
  },
  {
    topic: "Fractions",
    difficulty: 1,
    question: "What is 2½ + 1¾ ?",
    options: ["3¼", "4", "4¼", "3¾"],
    answer: 2,
    explanation: "Convert: 5/2 + 7/4 = 10/4 + 7/4 = 17/4 = <strong>4¼</strong>."
  },
  {
    topic: "Algebra",
    difficulty: 3,
    question: "Solve simultaneously: x + y = 7 and 2x − y = 5. What is x?",
    options: ["2", "3", "4", "5"],

    explanation: "Add the equations: 3x = 12 → x = <strong>4</strong>. Then y = 7 − 4 = 3."
  },

    difficulty: 2,

    options: ["1/5", "1/3", "1/2", "3/5"],

    options: ["3.45 × 10⁻⁴", "3.45 × 10⁻³", "34.5 × 10⁻⁵", "0.345 × 10⁻³"],
    answer: 0,
    explanation: "Move decimal 4 places right: 0.000345 = <strong>3.45 × 10⁻⁴</strong>."
  },
  {
    topic: "Geometry",
    difficulty: 2,
    question: "Two similar triangles have sides 6 cm and 9 cm. If the area of the smaller is 24 cm², what is the area of the larger?",
    options: ["36 cm²", "48 cm²", "54 cm²", "72 cm²"],
    answer: 2,
    explanation: "Ratio of sides = 6:9 = 2:3. Ratio of areas = 4:9. Larger area = (9/4) × 24 = <strong>54 cm²</strong>."
  },
  {
    topic: "Arithmetic",
    difficulty: 1,
    question: "Evaluate: 5 + 3 × 4 − 2",
    options: ["30", "15", "25", "11"],
    answer: 1,
    explanation: "BODMAS: Multiplication first → 5 + 12 − 2 = <strong>15</strong>."
  },
  {
    topic: "Algebra",
    difficulty: 2,
    question: "Expand: (x + 3)(x − 2)",
    options: ["x² − x − 6", "x² + x − 6", "x² − x + 6", "x² + 5x − 6"],
    answer: 1,
    explanation: "FOIL: x² − 2x + 3x − 6 = <strong>x² + x − 6</strong>."
  },
  {
    topic: "Trigonometry",
    difficulty: 2,
    question: "From a point 30 m from the base of a tower, the angle of elevation of the top is 60°. How tall is the tower? (tan 60° = √3 ≈ 1.732)",
    options: ["17.3 m", "30 m", "51.96 m", "60 m"],
    answer: 2,
    explanation: "Height = distance × tan 60° = 30 × √3 = 30 × 1.732 ≈ <strong>51.96 m</strong>."
  },
  {
    topic: "Percentage",
    difficulty: 1,
    question: "A student scored 54 out of 90. What percentage did she score?",
    options: ["54%", "60%", "65%", "72%"],
    answer: 1,
    explanation: "(54 ÷ 90) × 100 = <strong>60%</strong>."
  },
  {
    topic: "Number Theory",
    difficulty: 1,
    question: "What is the LCM of 4, 6, and 10?",

  },
  {
    topic: "Geometry",

    answer: 2,

  },
  {
    topic: "Algebra",
    difficulty: 1,
    question: "If a = 3 and b = −2, evaluate: 2a² − 3b",
    options: ["12", "24", "22", "18"],
    answer: 1,
    explanation: "2(3²) − 3(−2) = 2(9) + 6 = 18 + 6 = <strong>24</strong>."
  }
];

// ═══════════════════════════════════════════
//  CORE LOGIC
// ═══════════════════════════════════════════

const LABELS = ['A', 'B', 'C', 'D'];
const STORAGE_KEY = 'calculia_quiz';

function getDayOfYear() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  return Math.floor((now - start) / 86400000);
}

function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function loadStorage() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}

function saveStorage(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function updateStreak(correct) {
  const store = loadStorage();
  const today = getTodayKey();
  const d = new Date();
  const yesterday = new Date(d); yesterday.setDate(d.getDate() - 1);
  const yKey = `${yesterday.getFullYear()}-${yesterday.getMonth()+1}-${yesterday.getDate()}`;

  let streak = store.streak || 0;
  if (store.lastDate === yKey) { streak += 1; }
  else if (store.lastDate === today) { /* keep */ }
  else { streak = 1; }

  store.streak = streak;
  store.lastDate = today;
  store[today] = { answered: true, correct };
  saveStorage(store);
  return streak;
}

function getCountdown() {
  const now = new Date();
  const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
  const diff = tomorrow - now;
  const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
  const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
  const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
  return `${h}:${m}:${s}`;
}

function setDifficulty(level) {
  ['d1','d2','d3'].forEach((id, i) => {
    document.getElementById(id).className = 'dot' + (i < level ? ' filled' : '');
  });
}

function formatDate() {
  return new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════

const day = getDayOfYear();
const q = QUESTIONS[day % QUESTIONS.length];
const store = loadStorage();
const todayKey = getTodayKey();
const todayRecord = store[todayKey];

// Streak display
document.getElementById('streakCount').textContent = store.streak || 0;
document.getElementById('dayLabel').textContent = `Day ${day % QUESTIONS.length + 1} of ${QUESTIONS.length}`;
document.getElementById('topicPill').textContent = q.topic;
document.getElementById('questionText').textContent = q.question;
setDifficulty(q.difficulty);

// Progress bar (how far through the question bank)
const pct = Math.round(((day % QUESTIONS.length) / QUESTIONS.length) * 100);
document.getElementById('progressFill').style.width = pct + '%';

// Format date
document.getElementById('dayLabel').textContent = formatDate();

if (todayRecord && todayRecord.answered) {
  // Already answered — show summary
  document.getElementById('questionView').style.display = 'none';
  const ad = document.getElementById('alreadyDone');
  ad.style.display = 'block';
  ad.querySelector('.big-icon').textContent = todayRecord.correct ? '🏆' : '📖';
  ad.querySelector('h3').textContent = todayRecord.correct
    ? "Great job! You got it right!"
    : "You gave it a try!";
  document.getElementById('alreadyMsg').textContent =
    `You already answered today's ${q.topic} question. Come back tomorrow for a new challenge. Your streak: 🔥 ${store.streak || 1} day(s).`;
  document.getElementById('shareBtn').classList.add('visible');
} else {
  // Render options
  const list = document.getElementById('optionsList');
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-label">${LABELS[i]}</span> ${opt}`;
    btn.onclick = () => handleAnswer(i, btn);
    list.appendChild(btn);
  });
}

// Countdown
function tick() {
  document.getElementById('countdownTimer').textContent = getCountdown();
}
tick();
setInterval(tick, 1000);

// ═══════════════════════════════════════════
//  INTERACTION
// ═══════════════════════════════════════════

let answered = false;

function handleAnswer(chosen, btn) {
  if (answered) return;
  answered = true;

  const correct = chosen === q.answer;
  const streak = updateStreak(correct);

  // Mark all buttons
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add('correct');
    else if (i === chosen && !correct) b.classList.add('wrong');
  });

  // Result badge
  const badge = document.getElementById('resultBadge');
  const icon  = document.getElementById('resultIcon');
  const text  = document.getElementById('resultText');
  badge.classList.add('visible');
  if (correct) {
    badge.classList.add('right');
    icon.textContent  = '✅';
    text.textContent  = `Correct! 🔥 Streak: ${streak} day${streak > 1 ? 's' : ''}`;
  } else {
    badge.classList.add('wrong');
    icon.textContent  = '❌';
    text.textContent  = `Not quite. The answer is ${LABELS[q.answer]}.`;
  }

  // Explanation
  const expl = document.getElementById('explanation');
  expl.innerHTML = `<strong>Explanation:</strong> ${q.explanation}`;
  expl.classList.add('visible');

  // Share button
  document.getElementById('shareBtn').classList.add('visible');

  // Update streak display
  document.getElementById('streakCount').textContent = streak;
}

// ═══════════════════════════════════════════
//  SHARE
// ═══════════════════════════════════════════
function shareResult() {
  const record = loadStorage()[getTodayKey()];
  const emoji  = record && record.correct ? '✅' : '📖';
  const text   = `${emoji} Calculia Daily Quiz — ${formatDate()}\nTopic: ${q.topic}\nStreak: 🔥 ${store.streak || 1} day(s)\nTry it at calculiang.github.io`;
  if (navigator.share) {
    navigator.share({ title: 'Calculia Daily Quiz', text });
  } else {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('shareBtn');
      btn.textContent = '✅ Copied!';
      setTimeout(() => btn.textContent = 'Share Result 🔗', 2000);
    });
  }
}
</script>
