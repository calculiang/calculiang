  <style>
  :root {
    --navy: #0B1F3A;
    --navy-mid: #112748;
    --navy-light: #1A3A5C;
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dim: rgba(201,168,76,0.15);
    --white: #F4F0E8;
    --grey: #8A9BB0;
    --correct: #2ECC71;
    --wrong: #E74C3C;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .quiz-wrapper {
    width: 100%;
    max-width: 620px;
  }

  /* ── Header ── */
  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-icon {
    width: 38px; height: 38px;
    background: var(--gold);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--gold-light);
    letter-spacing: 0.02em;
  }
  .streak-badge {
    display: flex; align-items: center; gap: 6px;
    background: var(--gold-dim);
    border: 1px solid var(--gold);
    border-radius: 50px;
    padding: 6px 14px;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--gold-light);
  }

  /* ── Card ── */
  .quiz-card {
    background: var(--navy-mid);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 20px;
    padding: 32px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .quiz-card::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── Meta bar ── */
  .meta-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
  }
  .topic-pill {
    background: var(--gold-dim);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold-light);
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 4px 12px;
    border-radius: 50px;
  }
  .day-label {
    font-size: 0.75rem;
    color: var(--grey);
    font-weight: 400;
  }

  /* ── Question ── */
  .question-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    line-height: 1.65;
    color: var(--white);
    margin-bottom: 28px;
    min-height: 60px;
  }

  /* ── Difficulty dots ── */
  .difficulty {
    display: flex; gap: 4px; margin-bottom: 24px; align-items: center;
  }
  .difficulty span { font-size: 0.72rem; color: var(--grey); margin-right: 6px; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(201,168,76,0.25);
  }
  .dot.filled { background: var(--gold); }

  /* ── Options ── */
  .options { display: flex; flex-direction: column; gap: 12px; }

  .option-btn {
    display: flex; align-items: center; gap: 14px;
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: var(--radius);
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: left;
    width: 100%;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 400;
  }
  .option-btn:hover:not(:disabled) {
    background: var(--gold-dim);
    border-color: var(--gold);
    transform: translateX(4px);
  }
  .option-label {
    width: 30px; height: 30px; min-width: 30px;
    border-radius: 8px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 0.82rem;
    color: var(--gold-light);
    transition: all 0.2s;
  }

  /* States */
  .option-btn.correct {
    background: rgba(46,204,113,0.12);
    border-color: var(--correct);
    animation: pulse-correct 0.4s ease;
  }
  .option-btn.correct .option-label {
    background: var(--correct);
    border-color: var(--correct);
    color: #fff;
  }
  .option-btn.wrong {
    background: rgba(231,76,60,0.12);
    border-color: var(--wrong);
  }
  .option-btn.wrong .option-label {
    background: var(--wrong);
    border-color: var(--wrong);
    color: #fff;
  }
  .option-btn:disabled { cursor: default; transform: none; }

  @keyframes pulse-correct {
    0% { transform: scale(1); }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); }
  }

  /* ── Explanation ── */
  .explanation {
    margin-top: 20px;
    background: rgba(201,168,76,0.08);
    border-left: 3px solid var(--gold);
    border-radius: 0 10px 10px 0;
    padding: 14px 16px;
    font-size: 0.9rem;
    line-height: 1.6;
    color: #C8D8E8;
    display: none;
    animation: fadeIn 0.4s ease;
  }
  .explanation.visible { display: block; }
  .explanation strong { color: var(--gold-light); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Result badge ── */
  .result-badge {
    display: none;
    align-items: center; gap: 10px;
    margin-top: 20px;
    font-weight: 600; font-size: 0.95rem;
    animation: fadeIn 0.4s ease;
  }
  .result-badge.visible { display: flex; }
  .result-badge.right { color: var(--correct); }
  .result-badge.wrong { color: var(--wrong); }
  .result-icon { font-size: 1.3rem; }

  /* ── Footer ── */
  .quiz-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 28px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .countdown {
    font-size: 0.8rem;
    color: var(--grey);
    display: flex; align-items: center; gap: 6px;
  }
  .countdown-time { color: var(--gold-light); font-weight: 600; }

  .share-btn {
    background: transparent;
    border: 1.5px solid var(--gold);
    color: var(--gold-light);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }
  .share-btn:hover { background: var(--gold); color: var(--navy); }
  .share-btn.visible { display: block; }

  /* ── Progress bar ── */
  .progress-track {
    height: 3px;
    background: rgba(255,255,255,0.07);
    border-radius: 3px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 3px;
    transition: width 1s linear;
  }

  /* ── Already answered today ── */
  .already-done {
    text-align: center;
    padding: 20px 0;
    display: none;
  }
  .already-done .big-icon { font-size: 3rem; margin-bottom: 12px; }
  .already-done h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--gold-light);
    margin-bottom: 8px;
  }
  .already-done p { color: var(--grey); font-size: 0.88rem; line-height: 1.6; }

  /* Responsive */
  @media (max-width: 480px) {
    .quiz-card { padding: 22px 18px; }
    .question-text { font-size: 1.1rem; }
    .quiz-header { margin-bottom: 20px; }
  }
</style>

const LABELS = ['A', 'B', 'C', 'D'];
const STORAGE_KEY = 'calculia_quiz';

function getDayOfYear() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  return Math.floor((now - start) / 86400000);
}

function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function loadStorage() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}

function saveStorage(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function updateStreak(correct) {
  const store = loadStorage();
  const today = getTodayKey();
  const d = new Date();
  const yesterday = new Date(d); yesterday.setDate(d.getDate() - 1);
  const yKey = `${yesterday.getFullYear()}-${yesterday.getMonth()+1}-${yesterday.getDate()}`;

  let streak = store.streak || 0;
  if (store.lastDate === yKey) { streak += 1; }
  else if (store.lastDate === today) { /* keep */ }
  else { streak = 1; }

  store.streak = streak;
  store.lastDate = today;
  store[today] = { answered: true, correct };
  saveStorage(store);
  return streak;
}

function getCountdown() {
  const now = new Date();
  const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
  const diff = tomorrow - now;
  const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
  const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
  const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
  return `${h}:${m}:${s}`;
}

function setDifficulty(level) {
  ['d1','d2','d3'].forEach((id, i) => {
    document.getElementById(id).className = 'dot' + (i < level ? ' filled' : '');
  });
}

function formatDate() {
  return new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════

const day = getDayOfYear();
const q = QUESTIONS[day % QUESTIONS.length];
const store = loadStorage();
const todayKey = getTodayKey();
const todayRecord = store[todayKey];

// Streak display
document.getElementById('streakCount').textContent = store.streak || 0;
document.getElementById('dayLabel').textContent = `Day ${day % QUESTIONS.length + 1} of ${QUESTIONS.length}`;
document.getElementById('topicPill').textContent = q.topic;
document.getElementById('questionText').textContent = q.question;
setDifficulty(q.difficulty);

// Progress bar (how far through the question bank)
const pct = Math.round(((day % QUESTIONS.length) / QUESTIONS.length) * 100);
document.getElementById('progressFill').style.width = pct + '%';

// Format date
document.getElementById('dayLabel').textContent = formatDate();

if (todayRecord && todayRecord.answered) {
  // Already answered — show summary
  document.getElementById('questionView').style.display = 'none';
  const ad = document.getElementById('alreadyDone');
  ad.style.display = 'block';
  ad.querySelector('.big-icon').textContent = todayRecord.correct ? '🏆' : '📖';
  ad.querySelector('h3').textContent = todayRecord.correct
    ? "Great job! You got it right!"
    : "You gave it a try!";
  document.getElementById('alreadyMsg').textContent =
    `You already answered today's ${q.topic} question. Come back tomorrow for a new challenge. Your streak: 🔥 ${store.streak || 1} day(s).`;
  document.getElementById('shareBtn').classList.add('visible');
} else {
  // Render options
  const list = document.getElementById('optionsList');
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-label">${LABELS[i]}</span> ${opt}`;
    btn.onclick = () => handleAnswer(i, btn);
    list.appendChild(btn);
  });
}

// Countdown
function tick() {
  document.getElementById('countdownTimer').textContent = getCountdown();
}
tick();
setInterval(tick, 1000);

// ═══════════════════════════════════════════
//  INTERACTION
// ═══════════════════════════════════════════

let answered = false;

function handleAnswer(chosen, btn) {
  if (answered) return;
  answered = true;

  const correct = chosen === q.answer;
  const streak = updateStreak(correct);

  // Mark all buttons
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add('correct');
    else if (i === chosen && !correct) b.classList.add('wrong');
  });

  // Result badge
  const badge = document.getElementById('resultBadge');
  const icon  = document.getElementById('resultIcon');
  const text  = document.getElementById('resultText');
  badge.classList.add('visible');
  if (correct) {
    badge.classList.add('right');
    icon.textContent  = '✅';
    text.textContent  = `Correct! 🔥 Streak: ${streak} day${streak > 1 ? 's' : ''}`;
  } else {
    badge.classList.add('wrong');
    icon.textContent  = '❌';
    text.textContent  = `Not quite. The answer is ${LABELS[q.answer]}.`;
  }

  // Explanation
  const expl = document.getElementById('explanation');
  expl.innerHTML = `<strong>Explanation:</strong> ${q.explanation}`;
  expl.classList.add('visible');

  // Share button
  document.getElementById('shareBtn').classList.add('visible');

  // Update streak display
  document.getElementById('streakCount').textContent = streak;
}

// ═══════════════════════════════════════════
//  SHARE
// ═══════════════════════════════════════════
function shareResult() {
  const record = loadStorage()[getTodayKey()];
  const emoji  = record && record.correct ? '✅' : '📖';
  const text   = `${emoji} Calculia Daily Quiz — ${formatDate()}\nTopic: ${q.topic}\nStreak: 🔥 ${store.streak || 1} day(s)\nTry it at calculiang.github.io`;
  if (navigator.share) {
    navigator.share({ title: 'Calculia Daily Quiz', text });
  } else {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('shareBtn');
      btn.textContent = '✅ Copied!';
      setTimeout(() => btn.textContent = 'Share Result 🔗', 2000);
    });
  }
}
function toggleNav(){
  const nl=document.getElementById('navLinks');
  if(nl.style.display==='flex'){nl.style.cssText=''}
  else{nl.style.cssText='display:flex!important;flex-direction:column;position:fixed;top:62px;left:0;right:0;background:rgba(10,22,40,.98);padding:2rem;gap:1.5rem;border-bottom:1px solid rgba(201,168,76,.2);z-index:99;backdrop-filter:blur(12px)';
  nl.querySelectorAll('a').forEach(a=>{a.style.fontSize='1rem';a.addEventListener('click',()=>{nl.style.cssText=''})});}
}
</script>
